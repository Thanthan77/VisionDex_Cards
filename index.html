<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>VisionDex</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <h1>Générer une Carte VisionDex</h1>

   <input
        type="text"
        id="description"
        placeholder="Ex: une épée magique en cristal de glace"
        maxlength="100"
        pattern="[A-Za-zÀ-ÿ\s\-']+"
        title="Seules les lettres, espaces, tirets et apostrophes sont autorisés"
        autocomplete="off"
      />

    <button id="generate">Générer la carte</button>
    <button id="random-card" class="add-btn">Générer une carte aléatoire</button>

    <script src="js/app.js"></script>
  </body>
</html>
