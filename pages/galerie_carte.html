<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisionDex</title>
    <link rel="stylesheet" href="../css/galerie.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <a href="../index.html" class="home-btn">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <path d="M3 10L12 3L21 10V20C21 20.55 20.55 21 20 21H4C3.45 21 3 20.55 3 20V10Z" 
          stroke="#003366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</a>

    <header class="dex-header">
      <h1>Ma Collection</h1>
      <p id="dex-count">0 cartes enregistrées</p>
      <div class="header-controls">
        <input
          type="text"
          id="search"
          class="search-input"
          placeholder="Rechercher une carte..."
        />

        <select id="filter-rarity" class="filter-select">
          <option value="">Toutes les raretés</option>
          <option value="Commun">Commun</option>
          <option value="Rare">Rare</option>
          <option value="Épique">Épique</option>
          <option value="Légendaire">Légendaire</option>
        </select>
      </div>
    </header>

    <div id="gallery" class="gallery"></div>

    <div id="modal" class="modal hidden">
      <img id="modal-img" />
    </div>

    <script src="../js/visiondex.js"></script>
  </body>
</html>
