<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>VisionDex TCG Style</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@400;500&family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/carte.css" />
  </head>

  <body>
    <div class="card rarity-rare">
      <div class="card-inner">
        <div class="card-header">
          <div class="card-title">Crayon Papier Deluxe</div>
          <div class="rarity-badge">Rare</div>
        </div>

        <div class="card-image-frame">
          <div class="card-image-inner">
            <div class="emoji">📝</div>
          </div>
        </div>

        <div class="info-box">
          <div class="info-row">
            <div class="info-label">Type :</div>
            <div class="info-value">Objet / Outil</div>
          </div>
          <div class="info-row">
            <div class="info-label">Attributes :</div>
            <div class="info-value">wooden, yellow, sharp, lightweight</div>
          </div>
        </div>

        <div class="description-box">
          <div class="description-label">Description :</div>
          <div>
            Un crayon en bois de haute qualité, utilisé pour écrire, dessiner et
            esquisser avec précision.
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
